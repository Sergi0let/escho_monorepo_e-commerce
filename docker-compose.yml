services:
  postgres:
    image: postgres:16-alpine
    container_name: xml-converter-pg
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    ports:
      # зовнішній:внутрішній — якщо 5432 зайнятий на хості, змініть ліве значення (напр. 5436)
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
